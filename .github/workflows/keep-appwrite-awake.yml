name: Keep Appwrite Awake

on:
  schedule:
    # Run every 15 minutes for reliable anti-idle traffic.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate keep-alive configuration
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL || vars.KEEP_ALIVE_URL }}
          KEEP_ALIVE_TOKEN: ${{ secrets.KEEP_ALIVE_TOKEN }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "KEEP_ALIVE_URL is missing"
            exit 1
          fi

          if [ -z "$KEEP_ALIVE_TOKEN" ]; then
            echo "KEEP_ALIVE_TOKEN secret is missing"
            exit 1
          fi

      - name: Add jitter to avoid bot-like timing
        run: |
          SLEEP_SECONDS=$((RANDOM % 240))
          echo "Sleeping ${SLEEP_SECONDS}s before ping"
          sleep "$SLEEP_SECONDS"

      - name: Call keep-alive endpoint
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL || vars.KEEP_ALIVE_URL }}
          KEEP_ALIVE_TOKEN: ${{ secrets.KEEP_ALIVE_TOKEN }}
        run: |
          RESPONSE_FILE=$(mktemp)

          HTTP_STATUS=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            -H "x-keep-alive-token: $KEEP_ALIVE_TOKEN" \
            "$KEEP_ALIVE_URL")

          echo "HTTP status: $HTTP_STATUS"
          cat "$RESPONSE_FILE"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Keep-alive ping failed with status $HTTP_STATUS"
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            OK=$(jq -r '.ok // false' "$RESPONSE_FILE")
            if [ "$OK" != "true" ]; then
              echo "Keep-alive endpoint returned ok=false"
              exit 1
            fi
          fi

          echo "Keep-alive ping succeeded"
