name: Keep Appwrite Awake

on:
  schedule:
    # Run frequently, but gate the ping by KEEP_ALIVE_INTERVAL.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether ping is due
        id: gate
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL || vars.KEEP_ALIVE_URL }}
          KEEP_ALIVE_TOKEN: ${{ secrets.KEEP_ALIVE_TOKEN }}
          KEEP_ALIVE_INTERVAL: ${{ vars.KEEP_ALIVE_INTERVAL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: keep-appwrite-awake.yml
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "KEEP_ALIVE_URL secret is missing"
            exit 1
          fi

          if [ -z "$KEEP_ALIVE_TOKEN" ]; then
            echo "KEEP_ALIVE_TOKEN secret is missing"
            exit 1
          fi

          INTERVAL_MS="${KEEP_ALIVE_INTERVAL:-345600000}"

          if ! [[ "$INTERVAL_MS" =~ ^[0-9]+$ ]]; then
            echo "KEEP_ALIVE_INTERVAL must be an integer (milliseconds)"
            exit 1
          fi

          RUNS_JSON=$(curl -fsS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_FILE/runs?status=success&per_page=1")

          LAST_SUCCESS=$(echo "$RUNS_JSON" | jq -r '.workflow_runs[0].run_started_at // empty')

          if [ -z "$LAST_SUCCESS" ]; then
            echo "No previous successful runs found; ping is due."
            echo "should_ping=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW_MS=$(date +%s%3N)
          LAST_MS=$(date -d "$LAST_SUCCESS" +%s%3N)
          ELAPSED_MS=$((NOW_MS - LAST_MS))

          if [ "$ELAPSED_MS" -ge "$INTERVAL_MS" ]; then
            echo "Elapsed ${ELAPSED_MS}ms >= interval ${INTERVAL_MS}ms; ping is due."
            echo "should_ping=true" >> "$GITHUB_OUTPUT"
          else
            echo "Elapsed ${ELAPSED_MS}ms < interval ${INTERVAL_MS}ms; skipping ping."
            echo "should_ping=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Call keep-alive endpoint
        if: steps.gate.outputs.should_ping == 'true'
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL || vars.KEEP_ALIVE_URL }}
          KEEP_ALIVE_TOKEN: ${{ secrets.KEEP_ALIVE_TOKEN }}
        run: |
          curl -fsS \
            -H "x-keep-alive-token: $KEEP_ALIVE_TOKEN" \
            "$KEEP_ALIVE_URL" > /dev/null
          echo "Keep-alive ping succeeded"
